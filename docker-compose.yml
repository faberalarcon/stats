services:
  stats:
    build: .
    container_name: 21bristoe-stats
    restart: unless-stopped
    ports:
      - "127.0.0.1:5174:3000"
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - ORIGIN=${ORIGIN:-https://stats.21bristoe.com}
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
      - ADDRESS_HEADER=x-forwarded-for
      - XFF_DEPTH=1
      - HA_BASE_URL=${HA_BASE_URL:-http://ai.local:8123}
      - HA_TOKEN=${HA_TOKEN:-}
      - DRINK_HUB_URL=${DRINK_HUB_URL:-https://drink-hub.21bristoe.com}
      - TZ=${TZ:-America/New_York}
    volumes:
      - /var/lib/bristoe-backup:/var/lib/bristoe-backup:ro
    extra_hosts:
      - "ai.local:host-gateway"
